<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lyffin Listing Tool</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f6f6f4;--bg3:#efefec;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e0e0db;--border2:#ccc;
  --info-bg:#e8f0fe;--info-text:#1a56db;
  --success-bg:#ecfdf5;--success-text:#065f46;--success-border:#6ee7b7;
  --warn-bg:#fffbeb;--warn-text:#92400e;
  --danger-bg:#fef2f2;--danger-text:#991b1b;--danger-border:#fca5a5;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a2a;
  --text:#f0f0ee;--text2:#aaa;--text3:#666;
  --border:#333;--border2:#444;
  --info-bg:#1e3a5f;--info-text:#93c5fd;
  --success-bg:#064e3b;--success-text:#6ee7b7;--success-border:#065f46;
  --warn-bg:#451a03;--warn-text:#fcd34d;
  --danger-bg:#450a0a;--danger-text:#fca5a5;--danger-border:#7f1d1d;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.app{max-width:1140px;margin:0 auto;padding:1.25rem 1rem;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:1rem;border-bottom:.5px solid var(--border);margin-bottom:1rem;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:32px;width:auto;filter:var(--logo-filter,none);}
@media(prefers-color-scheme:dark){.logo img{filter:invert(1);}}
.logo-sub{font-size:11px;color:var(--text2);}
.steps{display:flex;gap:4px;margin-bottom:1.25rem;}
.step{flex:1;padding:7px 10px;border-radius:var(--radius);border:.5px solid var(--border);font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text2);background:var(--bg);}
.step.active{background:#111;color:white;border-color:#111;}
.step.done{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border);}
.step-n{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;background:rgba(0,0,0,.07);}
.step.active .step-n{background:rgba(255,255,255,.2);}
.step.done .step-n{border:1px solid var(--success-border);background:transparent;}
.panel{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;}
.panel-title{font-size:14px;font-weight:600;margin-bottom:1rem;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;color:var(--text2);}
input[type=text],input[type=date],input[type=number],textarea{font-size:13px;border:.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;background:var(--bg);color:var(--text);width:100%;outline:none;transition:border .15s;}
input:focus,textarea:focus{border-color:#555;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:var(--bg);color:var(--text);transition:all .1s;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover:not(:disabled){background:var(--bg2);}
.btn.primary{background:#111;color:white;border-color:#111;}
.btn.primary:hover:not(:disabled){background:#333;}
.btn.success{background:var(--success-bg);color:var(--success-text);border-color:var(--success-border);}
.btn.danger{background:var(--danger-bg);color:var(--danger-text);border-color:var(--danger-border);}
.btn.sm{padding:4px 10px;font-size:12px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;}
.tbl-wrap{border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--bg2);padding:7px 8px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:.5px solid var(--border);white-space:nowrap;}
.tbl td{padding:4px 6px;border-bottom:.5px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.active-row td{background:var(--info-bg);}
.tbl tr:hover:not(.active-row) td{background:var(--bg2);}
.detail{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;position:sticky;top:1rem;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;}
.sec-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:.85rem;padding-top:.85rem;border-top:.5px solid var(--border);}
.sec-label:first-child{margin-top:0;padding-top:0;border-top:none;}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:1rem;text-align:center;cursor:pointer;background:var(--bg2);}
.drop-zone:hover{background:var(--bg3);}
.finish-row{display:flex;gap:5px;margin-bottom:5px;}
.finish-row input{padding:5px 7px;font-size:12px;}
.del-btn{background:none;border:.5px solid var(--border);border-radius:var(--radius);padding:4px 8px;cursor:pointer;color:var(--text2);flex-shrink:0;font-size:12px;}
.del-btn:hover{color:var(--danger-text);}
.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.5rem;}
.swatch-slot{display:flex;flex-direction:column;align-items:center;gap:3px;}
.swatch-img-wrap{position:relative;width:100%;}
.swatch-img-wrap img{width:100%;height:auto;max-height:90px;object-fit:contain;border-radius:var(--radius);border:.5px solid var(--border);display:block;}
.swatch-del{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:#e74c3c;border:none;color:white;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.swatch-add{width:100%;height:60px;border:1.5px dashed var(--border2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2);}
.swatch-add:hover{background:var(--bg2);}
.swatch-label{font-size:9px;color:var(--text2);text-align:center;word-break:break-word;line-height:1.3;width:100%;}
.area-wrap{position:relative;}
.area-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius);z-index:100;max-height:150px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.area-sug-item{padding:7px 10px;font-size:13px;cursor:pointer;}
.area-sug-item:hover{background:var(--bg2);}
.canvas-wrap{position:relative;margin-bottom:.5rem;border-radius:var(--radius);overflow:hidden;border:.5px solid var(--border);background:#000;}
.canvas-wrap canvas{display:block;width:100%;cursor:crosshair;touch-action:none;}
.annotation-tools{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.4rem;align-items:center;}
.tool-btn{padding:4px 9px;border-radius:var(--radius);font-size:11px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:var(--bg2);color:var(--text);}
.tool-btn.active{background:#111;color:white;border-color:#111;}
.color-dot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.color-dot.active{border-color:#111;box-shadow:0 0 0 1px white;}
.drawing-list{display:flex;flex-direction:column;gap:5px;margin-bottom:.5rem;}
.drawing-item{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--bg2);border-radius:var(--radius);border:.5px solid var(--border);}
.drawing-item img{width:40px;height:40px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.drawing-item input{flex:1;font-size:12px;padding:3px 7px;border:.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem;}
.stat{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:500;}
.warn{padding:9px 13px;background:var(--warn-bg);color:var(--warn-text);border-radius:var(--radius);font-size:13px;margin-bottom:.75rem;}
.info-banner{padding:9px 13px;background:var(--info-bg);color:var(--info-text);border-radius:var(--radius);font-size:13px;margin-bottom:1rem;}
.proj-list{display:flex;flex-direction:column;gap:8px;}
.proj-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s;}
.proj-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.proj-card-name{font-size:14px;font-weight:600;}
.proj-card-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.proj-card-actions{display:flex;gap:6px;flex-shrink:0;}
.new-proj-card{border:1.5px dashed var(--border2);background:transparent;justify-content:center;color:var(--text2);}
.new-proj-card:hover{background:var(--bg2);color:var(--text);}
#save-badge{font-size:11px;color:var(--success-text);display:none;}
.install-bar{display:none;position:fixed;bottom:1rem;right:1rem;z-index:999;}
</style>
</head>

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-bar').style.display='block';});
document.getElementById('install-btn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-bar').style.display='none';};
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

const DB_NAME="LyffinDB",DB_VER=1,DB_STORE="projects";
let db=null;
let allProjects={};
let currentProjectId=null;
let step=0;
let project={clientName:"",quoteNo:"",projectName:"",date:new Date().toISOString().split("T")[0],dueDate:"",preparedBy:"",revision:"1",clientAddress:"",clientPhone:""};
let products=[];
let selectedId=null;
let usedAreas=[];
let annotCanvas=null,annotCtx=null,annotDrawing=false,annotTool="arrow",annotColor="#e74c3c",annotStartX=0,annotStartY=0,annotSnapshot=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(DB_STORE,{keyPath:"id"});};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=rej;
  });
}
function dbPut(obj){return new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,"readwrite");tx.objectStore(DB_STORE).put(obj).onsuccess=()=>res();tx.onerror=rej;});}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,"readonly");const r=tx.objectStore(DB_STORE).getAll();r.onsuccess=e=>res(e.target.result||[]);r.onerror=rej;});}
function dbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,"readwrite");tx.objectStore(DB_STORE).delete(id).onsuccess=()=>res();tx.onerror=rej;});}

async function loadAllProjects(){
  await openDB();
  const rows=await dbGetAll();
  allProjects={};
  rows.forEach(r=>allProjects[r.id]=r);
}
async function saveAllProjects(){
  if(currentProjectId&&allProjects[currentProjectId]){
    try{await dbPut(allProjects[currentProjectId]);}
    catch(e){alert("Save error: "+e.message);}
  }
}
async function saveCurrentProject(){
  if(!currentProjectId)return;
  usedAreas=[...new Set(products.map(p=>p.area).filter(Boolean))];
  allProjects[currentProjectId]={id:currentProjectId,name:project.clientName||"Untitled",meta:`${project.quoteNo||""}${project.quoteNo&&project.dueDate?" · ":""}${project.dueDate?"Due: "+project.dueDate:""}`,updatedAt:new Date().toISOString(),project,products,usedAreas};
  await saveAllProjects();
  const b=document.getElementById("save-badge");b.style.display="inline";setTimeout(()=>b.style.display="none",1800);
}
let _autosaveTimer=null;
function autosaveProject(){
  // Debounced save for free-text fields - avoids hammering IndexedDB on every keystroke
  clearTimeout(_autosaveTimer);
  _autosaveTimer=setTimeout(()=>saveCurrentProject(),600);
}
function openProject(id){const p=allProjects[id];if(!p)return;currentProjectId=id;project={...{clientName:"",quoteNo:"",projectName:"",date:new Date().toISOString().split("T")[0],dueDate:"",preparedBy:"",revision:"1",clientAddress:"",clientPhone:""},...p.project};products=p.products||[];usedAreas=p.usedAreas||[];selectedId=null;step=0;document.getElementById("save-btn").style.display="inline-flex";document.getElementById("close-btn").style.display="inline-flex";render();}
function newProject(){currentProjectId="proj_"+Date.now();project={clientName:"",quoteNo:"",projectName:"",date:new Date().toISOString().split("T")[0],dueDate:"",preparedBy:"",revision:"1",clientAddress:"",clientPhone:""};products=[blank()];usedAreas=[];selectedId=null;step=0;document.getElementById("save-btn").style.display="inline-flex";document.getElementById("close-btn").style.display="inline-flex";render();}
async function deleteProject(id){if(!confirm("Delete this project permanently?"))return;delete allProjects[id];await dbDelete(id);renderHome();}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportProject(id){
  const p=allProjects[id];
  if(!p){alert("Project not found.");return;}
  const payload=JSON.stringify({_lyffinExport:true,version:1,exportedAt:new Date().toISOString(),project:p});
  const safeName=(p.name||"Untitled").replace(/[^a-zA-Z0-9 \-_]/g,"").trim().replace(/\s+/g,"_")||"project";
  const filename=`Lyffin_${safeName}.lyffin`;
  const blob=new Blob([payload],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

async function importProject(file){
  try{
    const text=await new Promise((res,rej)=>{
      const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file);
    });
    const data=JSON.parse(text);
    if(!data._lyffinExport||!data.project){
      alert("This doesn't look like a valid Lyffin project file.");return;
    }
    const p=data.project;
    // Give it a fresh ID so it doesn't overwrite an existing project with the same ID
    const newId="proj_"+Date.now();
    p.id=newId;
    if(p.name)p.name=p.name; // keep name as-is
    // If a project with the same name already exists, append "(imported)"
    const existingNames=Object.values(allProjects).map(x=>x.name||"");
    if(existingNames.includes(p.name||"")){
      p.name=(p.name||"Untitled")+" (imported)";
    }
    allProjects[newId]=p;
    await dbPut(p);
    renderHome();
    // Offer to open it immediately
    if(confirm(`"${p.name||"Untitled"}" imported successfully.\n\nOpen it now?`)){
      openProject(newId);
    }
  }catch(e){
    alert("Could not import project: "+(e.message||"unknown error")+"\n\nMake sure the file is a valid .lyffin file.");
    console.error(e);
  }
}
async function closeProject(){await saveCurrentProject();currentProjectId=null;document.getElementById("save-btn").style.display="none";document.getElementById("close-btn").style.display="none";renderHome();}

// Compress image to max 1200px wide/tall, quality 0.82 JPEG — reduces storage by ~70%
function compressImage(dataURL, maxDim=1200, quality=0.82){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{
      console.error("compressImage: failed to load image");
      rej(new Error("Could not load image — the file may be corrupt or an unsupported format."));
    };
    img.src=dataURL;
  });
}

// Compress swatch to smaller size
async function compressSwatch(dataURL){
  // Use high quality for swatches - fabric textures need crisp detail
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      const maxDim=1600;
      if(w>maxDim||h>maxDim){
        if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.imageSmoothingEnabled=true;
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,w,h);
      // Use PNG for lossless quality, fallback to high quality JPEG
      const png=canvas.toDataURL('image/png');
      // If PNG is too large (>500KB), use high quality JPEG
      res(png.length > 700000 ? canvas.toDataURL('image/jpeg',0.97) : png);
    };
    img.src=dataURL;
  });
}

async function uploadDrawing(id,file){
  const p=products.find(x=>x.id===id);if(!p)return;
  if(!p.drawings)p.drawings=[];
  const caption=file.name.replace(/\.[^.]+$/,"");
  if(file.type==="application/pdf"){
    try{
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res();};s.onerror=rej;document.head.appendChild(s);});
      }
      const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      for(let n=1;n<=pdf.numPages;n++){
        const page=await pdf.getPage(n);const vp=page.getViewport({scale:2.0});
        const canvas=document.createElement("canvas");canvas.width=vp.width;canvas.height=vp.height;
        await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
        p.drawings.push({img:canvas.toDataURL("image/png"),caption:pdf.numPages>1?`${caption} — Page ${n}`:caption});
      }
    }catch(err){alert("PDF error: "+err.message);return;}
  }else{p.drawings.push({img:await readFile(file),caption});}
  saveCurrentProject();renderDetail();
}

function initAnnotCanvas(id){
  const p=getProd();if(!p||!p.productImage)return;
  annotCanvas=document.getElementById("annot-canvas-"+id);if(!annotCanvas)return;
  annotCtx=annotCanvas.getContext("2d");
  const img=new Image();
  img.onload=()=>{annotCanvas.width=img.width;annotCanvas.height=img.height;annotCtx.drawImage(img,0,0);if(p.annotatedImage){const ai=new Image();ai.onload=()=>annotCtx.drawImage(ai,0,0);ai.src=p.annotatedImage;}};
  img.src=p.productImage;

  // Touch support — convert touch events to synthetic mouse-like events
  function touchToMouse(e){
    e.preventDefault(); // prevent page scroll while drawing
    const t=e.touches[0]||e.changedTouches[0];
    return{clientX:t.clientX,clientY:t.clientY,target:e.target};
  }
  annotCanvas.addEventListener("touchstart", (e)=>annotMouseDown(touchToMouse(e)),{passive:false});
  annotCanvas.addEventListener("touchmove",  (e)=>annotMouseMove(touchToMouse(e)),{passive:false});
  annotCanvas.addEventListener("touchend",   (e)=>annotMouseUp(touchToMouse(e)),  {passive:false});
  annotCanvas.addEventListener("touchcancel",(e)=>{annotDrawing=false;annotSnapshot=null;},{passive:false});
}
function annotMouseDown(e){
  if(!annotCanvas)return;
  // Handle text tool immediately on mousedown with screen coordinates
  if(annotTool==="text"){
    const r=annotCanvas.getBoundingClientRect();
    const sx=annotCanvas.width/r.width,sy=annotCanvas.height/r.height;
    const cx=(e.clientX-r.left)*sx;
    const cy=(e.clientY-r.top)*sy;
    // Remove any existing input
    const old=document.getElementById("annot-text-input");
    if(old)old.remove();
    // Create floating input at click position
    const inp=document.createElement("input");
    inp.id="annot-text-input";
    inp.type="text";
    inp.placeholder="Type label → Enter";
    inp.style.cssText="position:fixed;z-index:99999;font-size:15px;font-weight:600;padding:5px 10px;border:2px solid "+annotColor+";border-radius:6px;background:#fff;color:#111;outline:none;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,.35);left:"+Math.min(e.clientX,window.innerWidth-200)+"px;top:"+Math.max(e.clientY-44,10)+"px;";
    document.body.appendChild(inp);
    // Use requestAnimationFrame to ensure DOM is ready before focusing
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        inp.focus();
        inp.select();
      });
    });
    const fontSize=Math.max(22,Math.round(annotCanvas.width/28));
    function drawLabel(){
      const label=inp.value.trim();
      if(!label){inp.remove();return;}
      annotCtx.font="bold "+fontSize+"px Arial";
      annotCtx.lineWidth=Math.max(2,fontSize/7);
      annotCtx.strokeStyle="white";
      annotCtx.fillStyle=annotColor;
      annotCtx.strokeText(label,cx,cy);
      annotCtx.fillText(label,cx,cy);
      inp.remove();
    }
    inp.addEventListener("keydown",function(ev){
      if(ev.key==="Enter"){ev.preventDefault();drawLabel();}
      else if(ev.key==="Escape"){inp.remove();}
    });
    // Only dismiss on blur if user clicked outside (not on the input itself)
    inp.addEventListener("blur",function(){
      // Long delay to allow Enter key to process first
      setTimeout(()=>{
        const still=document.getElementById("annot-text-input");
        if(still&&document.activeElement!==still){
          still.remove(); // dismiss without drawing on accidental blur
        }
      },300);
    });
    return; // Don't start drawing
  }
  annotDrawing=true;
  const r=annotCanvas.getBoundingClientRect();
  const sx=annotCanvas.width/r.width,sy=annotCanvas.height/r.height;
  annotStartX=(e.clientX-r.left)*sx;
  annotStartY=(e.clientY-r.top)*sy;
  annotSnapshot=annotCtx.getImageData(0,0,annotCanvas.width,annotCanvas.height);
}
function annotMouseMove(e){if(!annotDrawing||!annotSnapshot)return;const r=annotCanvas.getBoundingClientRect();const sx=annotCanvas.width/r.width,sy=annotCanvas.height/r.height;const x=(e.clientX-r.left)*sx,y=(e.clientY-r.top)*sy;annotCtx.putImageData(annotSnapshot,0,0);drawAnnotShape(annotStartX,annotStartY,x,y);}
function annotMouseUp(e){if(!annotDrawing)return;annotDrawing=false;const r=annotCanvas.getBoundingClientRect();const sx=annotCanvas.width/r.width,sy=annotCanvas.height/r.height;const x=(e.clientX-r.left)*sx,y=(e.clientY-r.top)*sy;if(annotSnapshot)annotCtx.putImageData(annotSnapshot,0,0);drawAnnotShape(annotStartX,annotStartY,x,y);annotSnapshot=null;}
function drawAnnotShape(x1,y1,x2,y2){
  annotCtx.strokeStyle=annotColor;annotCtx.fillStyle=annotColor;annotCtx.lineWidth=Math.max(2,annotCanvas.width/200);
  if(annotTool==="arrow"){const hl=Math.max(16,annotCanvas.width/40);const a=Math.atan2(y2-y1,x2-x1);annotCtx.beginPath();annotCtx.moveTo(x1,y1);annotCtx.lineTo(x2,y2);annotCtx.stroke();annotCtx.beginPath();annotCtx.moveTo(x2,y2);annotCtx.lineTo(x2-hl*Math.cos(a-Math.PI/6),y2-hl*Math.sin(a-Math.PI/6));annotCtx.lineTo(x2-hl*Math.cos(a+Math.PI/6),y2-hl*Math.sin(a+Math.PI/6));annotCtx.closePath();annotCtx.fill();}
  else if(annotTool==="circle"){const rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;annotCtx.beginPath();annotCtx.ellipse((x1+x2)/2,(y1+y2)/2,rx,ry,0,0,Math.PI*2);annotCtx.stroke();}
  else if(annotTool==="line"){annotCtx.beginPath();annotCtx.moveTo(x1,y1);annotCtx.lineTo(x2,y2);annotCtx.stroke();}
  // Note: "text" tool is handled directly in annotMouseDown (needs screen coords from the event)
}

/* SPECS SECTION */
.specs{flex-shrink:0;border-top:1px solid #ccc;padding-top:7px;}
.specs-title{font-size:15px;font-weight:700;margin-bottom:7px;border-bottom:.5px solid #eee;padding-bottom:3px;}
.specs-grid{display:flex;align-items:flex-start;}
.specs-left-col{flex-shrink:0;width:55mm;padding-right:6mm;border-right:.5px solid #e2e2e2;}
.specs-mid-col{flex-shrink:0;display:flex;flex-direction:column;gap:4px;align-items:stretch;width:150px;padding:0 6mm;border-right:.5px solid #e2e2e2;}
.specs-right-col{flex:1;display:flex;flex-direction:column;gap:7px;align-items:flex-start;padding-left:6mm;min-width:115px;}
.spec-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.spec-dim{font-size:12px;color:#555;margin-bottom:5px;}
.spec-section-label{font-size:10px;font-weight:700;color:#111;text-transform:uppercase;letter-spacing:.05em;margin-top:5px;margin-bottom:2px;border-bottom:.5px solid #ddd;padding-bottom:1px;display:inline-block;margin-right:6px;}
.spec-row{display:flex;align-items:baseline;gap:5px;margin-bottom:3px;}
.spec-key{font-size:11px;color:#c0392b;font-weight:700;white-space:nowrap;min-width:78px;flex-shrink:0;}
.spec-val{font-size:11px;color:#111;flex:1;}
.grey{color:#888;}
.swatch-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;}
.swatch-frame{width:100%;max-width:135px;height:100px;display:flex;align-items:center;justify-content:center;border:.5px solid #ccc;border-radius:3px;background:#fafafa;overflow:hidden;}
.swatch-lbl{font-size:9px;color:#c0392b;font-weight:700;text-align:center;word-break:break-word;line-height:1.3;width:100%;}

/* FOOTER */
.pf{flex-shrink:0;margin-top:3px;padding-top:4px;border-top:.5px solid #eee;display:flex;justify-content:space-between;font-size:9px;color:#888;}

/* SUMMARY PAGE */
.stbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:10px;}
.stbl th{background:#f5f5f5;padding:6px 8px;text-align:left;border:.5px solid #ddd;font-size:10px;text-transform:uppercase;letter-spacing:.04em;}
.stbl td{padding:6px 8px;border:.5px solid #eee;}
.srow{display:flex;gap:12px;margin:10px 0;}
.sbox{border:1px solid #ddd;border-radius:4px;padding:8px 18px;text-align:center;}
.sn{font-size:24px;font-weight:700;}
.sl{font-size:9px;color:#888;text-transform:uppercase;}

// ── Drag to reorder products ────────────────────────────────────────────────
let dragSrcId=null;
function dragStart(e,id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed="move";
  e.currentTarget.style.opacity="0.4";
}
function dragOver(e,id){
  e.preventDefault();
  e.dataTransfer.dropEffect="move";
  // Highlight drop target
  document.querySelectorAll("tr[draggable]").forEach(r=>r.style.borderTop="");
  if(id!==dragSrcId){
    const rows=[...document.querySelectorAll("tr[draggable]")];
    const targetRow=rows.find(r=>r.getAttribute("ondrop")&&r.getAttribute("ondrop").includes("'"+id+"'"));
    if(targetRow)targetRow.style.borderTop="2px solid #111";
  }
}
function dragDrop(e,targetId){
  e.preventDefault();
  if(!dragSrcId||dragSrcId===targetId)return;
  const srcIdx=products.findIndex(p=>p.id===dragSrcId);
  const tgtIdx=products.findIndex(p=>p.id===targetId);
  if(srcIdx<0||tgtIdx<0)return;
  // Move product from srcIdx to tgtIdx
  const moved=products.splice(srcIdx,1)[0];
  products.splice(tgtIdx,0,moved);
  saveCurrentProject();
  renderTableRows();
}
function dragEnd(e){
  e.currentTarget.style.opacity="";
  document.querySelectorAll("tr[draggable]").forEach(r=>r.style.borderTop="");
  dragSrcId=null;
}

// ── VERIFY STEP — cross-check products against the original quotation ───────
let quoteRows=null;       // parsed rows from the uploaded quotation: [{no,name,dimensions,qty,area}]
let quoteFileName=null;
let quoteFileType=null;   // "csv" | "xlsx" | "pdf"

function normText(s){
  return (s||"").toString().toLowerCase().replace(/[₹,]/g,"").replace(/\s+/g," ").trim();
}
function normNum(s){
  const n=parseFloat((s||"").toString().replace(/[^0-9.]/g,""));
  return isNaN(n)?null:n;
}

// Parse a CSV/XLSX file into normalized quote rows using SheetJS
async function parseSpreadsheetQuote(file){
  if(!window.XLSX){
    await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});
  }
  const buf=await file.arrayBuffer();
  const wb=window.XLSX.read(buf,{type:"array"});
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const rows=window.XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});

  // Find the header row by looking for common quotation column names
  let headerIdx=-1,cols={};
  for(let i=0;i<Math.min(rows.length,15);i++){
    const row=rows[i].map(c=>normText(c));
    const noCol=row.findIndex(c=>c==="no"||c==="#"||c==="sl"||c==="sl no"||c==="item");
    const descCol=row.findIndex(c=>c.includes("description")||c.includes("product")||c.includes("name"));
    const qtyCol=row.findIndex(c=>c==="qty"||c.includes("quantity"));
    if(descCol>=0&&qtyCol>=0){
      headerIdx=i;
      cols={no:noCol,desc:descCol,qty:qtyCol,
        dim:row.findIndex(c=>c.includes("dimension")||c.includes("material")||c.includes("size")),
        area:row.findIndex(c=>c.includes("area")||c.includes("room")||c.includes("zone"))};
      break;
    }
  }
  if(headerIdx<0)throw new Error("Could not find a header row with Description/Qty columns in this file.");

  const out=[];
  let currentArea="";
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.every(c=>!c&&c!==0))continue;
    const desc=(row[cols.desc]||"").toString().trim();
    const qtyRaw=cols.qty>=0?row[cols.qty]:"";
    const qty=normNum(qtyRaw);
    // A row with text in description but no usable qty AND no other populated cells is likely a section/area heading
    const otherCellsEmpty=row.every((c,ci)=>ci===cols.desc||(!c&&c!==0));
    if(desc&&(qty===null)&&otherCellsEmpty){
      currentArea=desc;
      continue;
    }
    if(!desc||qty===null)continue;
    out.push({
      no:cols.no>=0?(row[cols.no]||"").toString().trim():String(out.length+1),
      name:desc,
      dimensions:cols.dim>=0?(row[cols.dim]||"").toString().trim():"",
      qty:qty,
      area:currentArea
    });
  }
  if(!out.length)throw new Error("No product rows found in this file.");
  return out;
}

// Parse a quotation PDF (text-based, like the Lyffin quotation template) into normalized quote rows
async function parsePdfQuote(file){
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res();};s.onerror=rej;document.head.appendChild(s);});
  }
  const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let fullText=[];
  for(let n=1;n<=pdf.numPages;n++){
    const page=await pdf.getPage(n);
    const content=await page.getTextContent();
    // Group text items by approximate Y position to reconstruct rows
    const items=content.items.map(it=>({str:it.str,x:it.transform[4],y:Math.round(it.transform[5])}));
    fullText.push(...items);
  }
  // Group into lines by Y coordinate (within 3px tolerance), then sort left-to-right
  const lines=[];
  fullText.sort((a,b)=>b.y-a.y);
  let curY=null,curLine=[];
  for(const it of fullText){
    if(curY===null||Math.abs(it.y-curY)>3){
      if(curLine.length)lines.push(curLine);
      curLine=[it];curY=it.y;
    }else{
      curLine.push(it);
    }
  }
  if(curLine.length)lines.push(curLine);
  const textLines=lines.map(l=>l.sort((a,b)=>a.x-b.x).map(i=>i.str).join(" ").replace(/\s+/g," ").trim()).filter(Boolean);

  // Parse rows: lines that start with a number followed by a description, dimension, price, qty, total
  // Pattern from the Lyffin quotation format: "N  Description  Dimension/Material  ₹Price  QTY  ₹Total"
  const out=[];
  let currentArea="";
  const rowRe=/^(\d{1,3})\s+(.+?)\s+(₹[\d,]+|\d[\d,]*\.?\d*)\s+(\d{1,3})\s+(₹[\d,]+)\s*$/;
  for(const line of textLines){
    // Section heading: all-caps short line with no numbers/currency
    if(/^[A-Z][A-Z\s\-&]{2,40}$/.test(line)&&!/\d/.test(line)){
      currentArea=line.trim();
      continue;
    }
    const m=line.match(rowRe);
    if(m){
      const no=m[1];
      let rest=m[2].trim();
      const qty=normNum(m[4]);
      // The description column often contains both name and dimension run together;
      // try to split on common dimension patterns (cm, Dia, x, Standard Dimension)
      let name=rest,dim="";
      const dimMatch=rest.match(/^(.*?)\s+((?:standard dimension|[\d.]+\s*cm.*|[\d.]+\s*x\s*[\d.]+.*)?)$/i);
      // Simpler heuristic: split at first occurrence of a number followed by cm/x/dia, case-insensitive
      const splitMatch=rest.match(/^(.*?)\s+((?:\d[\d.]*\s*(?:cm|x|dia)|standard dimension).*)$/i);
      if(splitMatch&&splitMatch[1].trim()){
        name=splitMatch[1].trim();
        dim=splitMatch[2].trim();
      }
      out.push({no,name,dimensions:dim,qty,area:currentArea});
    }
  }
  if(!out.length)throw new Error("Could not find product rows in this PDF. Try exporting the quotation as CSV/Excel instead for more reliable matching.");
  return out;
}

async function handleQuoteUpload(file){
  quoteFileName=file.name;
  const ext=file.name.split(".").pop().toLowerCase();
  const statusEl=document.getElementById("verify-status");
  if(statusEl)statusEl.textContent="Reading "+file.name+"…";
  try{
    if(ext==="csv"||ext==="xlsx"||ext==="xls"){
      quoteFileType=ext==="csv"?"csv":"xlsx";
      quoteRows=await parseSpreadsheetQuote(file);
    }else if(ext==="pdf"){
      quoteFileType="pdf";
      quoteRows=await parsePdfQuote(file);
    }else{
      throw new Error("Please upload a .csv, .xlsx, or .pdf file.");
    }
    renderVerify();
  }catch(e){
    quoteRows=null;
    if(statusEl)statusEl.textContent="";
    alert("Could not read the quotation file: "+e.message);
    console.error(e);
  }
}

function clearQuote(){quoteRows=null;quoteFileName=null;quoteFileType=null;renderVerify();}

// Match listing-tool products against parsed quote rows.
// Primary match: by item number (productNo). Fallback: by normalized name+area similarity.
function matchQuoteRows(){
  if(!quoteRows)return null;
  const usedQuoteIdx=new Set();
  const results=products.map((p,i)=>{
    let match=null,matchIdx=-1;
    // Try matching by product number first
    const pNo=(p.productNo||String(i+1)).toString().trim();
    for(let qi=0;qi<quoteRows.length;qi++){
      if(usedQuoteIdx.has(qi))continue;
      if(quoteRows[qi].no===pNo){match=quoteRows[qi];matchIdx=qi;break;}
    }
    // Fallback: match by normalized name (and area if available)
    if(!match){
      const pName=normText(p.name);
      for(let qi=0;qi<quoteRows.length;qi++){
        if(usedQuoteIdx.has(qi))continue;
        const qName=normText(quoteRows[qi].name);
        if(qName&&pName&&(qName===pName||qName.includes(pName)||pName.includes(qName))){
          match=quoteRows[qi];matchIdx=qi;break;
        }
      }
    }
    if(matchIdx>=0)usedQuoteIdx.add(matchIdx);

    if(!match){
      return{product:p,quote:null,status:"missing",issues:["Not found in quotation"]};
    }
    const issues=[];
    const qtyP=normNum(p.qty),qtyQ=match.qty;
    if(qtyP!==null&&qtyQ!==null&&qtyP!==qtyQ){
      issues.push(`Qty mismatch: listing has ${qtyP}, quotation has ${qtyQ}`);
    }
    const nameP=normText(p.name),nameQ=normText(match.name);
    if(nameP&&nameQ&&nameP!==nameQ&&!nameQ.includes(nameP)&&!nameP.includes(nameQ)){
      issues.push(`Name differs: "${p.name}" vs quotation "${match.name}"`);
    }
    const dimP=normText(p.dimensions),dimQ=normText(match.dimensions);
    if(dimP&&dimQ&&dimP!==dimQ){
      issues.push(`Dimensions differ: "${p.dimensions}" vs quotation "${match.dimensions}"`);
    }
    return{product:p,quote:match,status:issues.length?"mismatch":"ok",issues};
  });

  const unmatchedQuoteRows=quoteRows.filter((q,qi)=>!usedQuoteIdx.has(qi));
  return{results,unmatchedQuoteRows};
}

function generatePDF(branded=true){
  try{
    const safeName=(project.clientName||"Client").replace(/[^a-zA-Z0-9 ]/g,"").trim().replace(/\s+/g,"_");
    const rev=(project.revision||"1").replace(/[^a-zA-Z0-9]/g,"");
    const suffix=branded?"":"_FC";
    const filename=`Lyffin X ${safeName}_Factory List_Rev${rev}${suffix}.pdf`;
    const html=buildPDF(branded);

    // Method 1: try window.open (works in Chrome browser)
    const w=window.open("","_blank");
    if(w&&!w.closed){
      w.document.write(html);
      w.document.close();
      w.document.title=filename.replace(".pdf","");
      setTimeout(()=>{try{w.print();}catch(e){console.log(e);}},800);
      return;
    }

    // Method 2: hidden iframe (reliable in Electron - window.open popups are often blocked there)
    printViaHiddenIframe(html);

  }catch(err){
    alert("PDF error: "+err.message+"\n\nTry: File > Print from your browser after opening the PDF.");
    console.error(err);
  }
}

function printViaHiddenIframe(html){
  // Remove any previous print iframe
  const old=document.getElementById("pdf-print-frame");
  if(old)old.remove();
  const iframe=document.createElement("iframe");
  iframe.id="pdf-print-frame";
  iframe.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;";
  document.body.appendChild(iframe);
  const doc=iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  iframe.onload=()=>{
    setTimeout(()=>{
      try{
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      }catch(e){
        alert("Could not open print dialog automatically. Please try again, or check your browser's popup settings.");
        console.error(e);
      }
    },400);
  };
}

async function pushToOps() {
  const sel = document.getElementById('ops-project-select');
  const statusEl = document.getElementById('ops-push-status');
  const btn = document.getElementById('push-ops-btn');

  if (!sel || !sel.value) {
    if (statusEl) statusEl.textContent = '⚠ Please select an Ops project first.';
    return;
  }

  if (!opsDb) {
    if (statusEl) statusEl.textContent = '⚠ Not connected to Ops. Please try again.';
    return;
  }

  const opsProjectId = sel.value;
  btn.disabled = true;
  btn.textContent = 'Pushing…';
  if (statusEl) statusEl.textContent = '';

  try {
    const { doc, setDoc, collection, writeBatch, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js');

    const batch = writeBatch(opsDb);

    // Push each product as an item under the project
    products.forEach(p => {
      const itemRef = doc(collection(opsDb, 'projects', opsProjectId, 'items'), p.id);
      batch.set(itemRef, {
        productNo:    p.productNo || '',
        name:         p.name || 'Unnamed product',
        qty:          parseInt(p.qty) || 1,
        area:         p.area || '',
        dimensions:   p.dimensions || '',
        details:      p.details || '',
        finishes:     (p.finishes || []).filter(Boolean),
        upholstery:   (p.upholstery || []).filter(Boolean),
        // Production stages — all start as pending
        carpentryStatus:  'pending', // Structure stage
        polishStatus:     'pending',
        upholsteryStatus: 'pending', // always included — mark N/A manually if not needed
        packingStatus:    'pending',
        overallStatus:    'Structure',
        pushedAt:     serverTimestamp(),
        pushedFrom:   'factory-listing-tool',
        listingProjectId: currentProjectId,
      });
    });

    // Note: project status update skipped (requires auth)
    // Update manually in the Ops dashboard after pushing

    await batch.commit();

    btn.textContent = '✓ Pushed!';
    btn.style.background = '#27ae60';
    if (statusEl) statusEl.textContent = `✓ ${products.length} products pushed to Ops. Factory floor can now track progress.`;

    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '🚀 Push to Ops';
      btn.style.background = '#b89a6a';
    }, 3000);

  } catch(e) {
    console.error('Push to Ops error:', e);
    btn.disabled = false;
    btn.textContent = '🚀 Push to Ops';
    if (statusEl) statusEl.textContent = '✗ Push failed: ' + e.message;
  }
}
